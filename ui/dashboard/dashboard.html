<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BadAds Dashboard</title>
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <div class="shell">
    <main class="dashboard">
      <header class="hero">
        <div class="hero__left">
          <div class="hero__badge">
            <span class="hero__title">BadAds</span>
            <span class="hero__version">Live Monitor</span>
          </div>
          <h1 class="hero__headline">Protection Overview</h1>
          <p class="hero__subtext">Recent blocking activity across your browsing session.</p>
        </div>
        <div class="hero__right">
          <span class="hero__label">Status</span>
          <div class="hero__status">
            <span class="hero__dot"></span>
            <span>Active</span>
          </div>
        </div>
      </header>

      <section class="metric-grid">
        <article class="metric-card">
          <span>Total Blocks</span>
          <strong id="metricTotal">0</strong>
        </article>
        <article class="metric-card">
          <span>Most Blocked Domain</span>
          <strong id="metricDomain">-</strong>
        </article>
        <article class="metric-card">
          <span>Blocked Today</span>
          <strong id="metricToday">0</strong>
        </article>
        <article class="metric-card">
          <span>14-Day Trend</span>
          <strong id="metricTrend">-</strong>
        </article>
      </section>

      <section class="chart-card">
        <div class="chart-card__title-row">
          <div>
            <h2>Blocked Activity</h2>
            <p>Rolling 14-day history</p>
          </div>
        </div>
        <canvas id="activityChart" width="1200" height="360"></canvas>
      </section>

      <section class="detail-card">
        <div class="detail-card__header">
          <h3>Recent Block Events</h3>
          <p>Latest detections captured by the extension</p>
        </div>
        <div id="logsContainer" class="logs"></div>
      </section>
    </main>
  </div>
  <script src="dashboard.js" type="module"></script>
</body>
</html>
